<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>瞬間英作</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>瞬間英作</h1>
  <select id="scene-select" class="scene-select" aria-label="シーン選択"></select>
  <div class="stats">
    <span id="progress">0 / 0</span>
    <span class="sep">·</span>
    <span id="due-count">本日残: 0</span>
  </div>
</header>

<main>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="study">学習</button>
    <button class="mode-tab" data-mode="list">一覧</button>
    <button class="mode-tab" data-mode="review">復習</button>
  </div>

  <section id="card" class="card">
    <div class="level-tag" id="level-tag">B1</div>
    <div class="jp" id="jp">読み込み中...</div>

    <div class="actions" id="actions-pre">
      <button class="btn primary" id="btn-reveal">答えを見る</button>
      <button class="btn ghost" id="btn-mic" title="自分の発音を試す">🎤</button>
      <div id="mic-result" class="mic-result"></div>
    </div>

    <div class="answer hidden" id="answer">
      <div class="en-row">
        <span class="en" id="en"></span>
        <button class="icon-btn" id="btn-tts" title="音声再生">🔊</button>
      </div>
      <div class="alt" id="alt"></div>
      <div class="note" id="note"></div>

      <div class="grade-buttons">
        <button class="btn grade-x" data-grade="x">× 言えなかった</button>
        <button class="btn grade-tri" data-grade="tri">△ 惜しい</button>
        <button class="btn grade-o" data-grade="o">◯ 言えた</button>
      </div>
    </div>
  </section>

  <section id="empty" class="empty hidden">
    <p>🎉 今日のセッション完了！</p>
    <p class="sub">明日また続きから。</p>
    <button class="btn ghost" id="btn-restart">やり直す（全リセット）</button>
  </section>

  <section id="list" class="list-view hidden">
    <div class="list-toolbar">
      <input type="search" id="list-search" class="list-search" placeholder="🔍 日本語/英語で検索" autocomplete="off">
      <div class="list-toolbar-row">
        <label class="toolbar-toggle">
          <input type="checkbox" id="list-show-en" checked>
          英語を表示
        </label>
        <span id="list-count" class="list-count">0 件</span>
      </div>
    </div>
    <ul id="list-items" class="list-items"></ul>
  </section>

  <section id="review" class="review hidden">
    <div class="review-status">
      <span id="review-progress">0 / 0</span>
      <span class="sep">·</span>
      <span id="review-state">停止中</span>
    </div>

    <div class="review-card">
      <div class="jp" id="review-jp">復習する問題がありません。<br>まず「学習」モードで何問か解いてください。</div>
      <div class="en" id="review-en"></div>
    </div>

    <div class="review-controls">
      <button class="icon-btn lg" id="btn-rev-prev" aria-label="前へ">⏮</button>
      <button class="btn primary" id="btn-rev-play">▶ 再生</button>
      <button class="icon-btn lg" id="btn-rev-next" aria-label="次へ">⏭</button>
    </div>

    <div class="review-options">
      <label>
        JP → EN の間隔
        <input type="range" id="rev-gap" min="0.5" max="5" step="0.5" value="2.5">
        <span id="rev-gap-label">2.5秒</span>
      </label>
      <label>
        次へ進む間隔
        <input type="range" id="rev-next-gap" min="0.5" max="4" step="0.5" value="1.5">
        <span id="rev-next-gap-label">1.5秒</span>
      </label>
      <label>
        <input type="checkbox" id="rev-jp-tts" checked>
        日本語も読み上げる
      </label>
      <label>
        <input type="checkbox" id="rev-loop">
        最後まで行ったら繰り返す
      </label>
      <label>
        <input type="checkbox" id="rev-only-seen">
        学習済みだけに絞る
      </label>
      <p class="hint">対象: 現在のシーンの<b>全例文</b>。学習履歴に関係なく流せます。</p>
    </div>
  </section>
</main>

<footer>
  <details>
    <summary>設定 / ヘルプ</summary>
    <div class="settings">
      <label>
        <input type="checkbox" id="opt-gemini-tts">
        Gemini TTS を使う（より自然な音声、API キー要）
      </label>
      <label>
        音声速度
        <input type="range" id="opt-rate" min="0.6" max="1.2" step="0.05" value="0.95">
        <span id="rate-label">0.95</span>
      </label>
      <p class="hint">採点: <b>◯</b>=次回3日後 / <b>△</b>=明日 / <b>×</b>=今日中に再出題</p>
      <p class="hint">進捗は端末内にのみ保存されます。</p>
    </div>
  </details>
</footer>

<script src="app.js"></script>
</body>
</html>
